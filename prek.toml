# Prek configuration (Rust-based pre-commit replacement)
# Install prek: mise install cargo-prek || cargo install prek
# Run: prek install && prek run --all-files

default_install_hook_types = ["pre-commit", "pre-push", "commit-msg"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "pre-commit"
name = "Pre-commit"
entry = "make hooks-pre-commit"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "commit-msg"
name = "Commit message"
entry = "bash -lc 'make hooks-commit-msg HOOK_COMMIT_MSG_FILE=\"$1\"' --"
language = "system"
pass_filenames = true
stages = ["commit-msg"]

[[repos.hooks]]
id = "pre-push"
name = "Pre-push"
entry = "make hooks-pre-push"
language = "system"
pass_filenames = false
stages = ["pre-push"]

# Prek configuration (Rust-based pre-commit replacement)
# Install prek: mise install cargo-prek || cargo install prek
# Run: prek install && prek run --all-files

repos = [
  {
    repo = "local",
    hooks = [
      { id = "pre-commit", name = "Pre-commit", entry = "make hooks-pre-commit", language = "system", pass_filenames = false },
      { id = "pre-push", name = "Pre-push", entry = "make hooks-pre-push", language = "system", pass_filenames = false, stages = ["pre-push"] }
    ]
  }
]

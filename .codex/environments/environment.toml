[[actions]]
name = "Release Finalize"
icon = "tool"
command = '''
set -euo pipefail

release_branch="${1:-}"
if [ -z "$release_branch" ]; then
  echo "Usage: Release Finalize <release-branch>"
  echo "Example: Release Finalize codex/release-0.12.1-coherence"
  exit 2
fi

case "$release_branch" in
  codex/release-*|release-*) ;;
  *)
    echo "Expected a release branch matching codex/release-* or release-*"
    exit 2
    ;;
esac

git fetch --prune origin main "$release_branch"
git checkout main
local_main_ahead_count="$(git rev-list --count origin/main..HEAD)"
if [ "$local_main_ahead_count" -ne 0 ]; then
  echo "Local main is ahead of origin/main; aborting."
  echo "Reconcile local commits before running Release Finalize."
  exit 2
fi

git pull --ff-only origin main
pull_status=$?
if [ "$pull_status" -ne 0 ]; then
  local_main_ahead_count="$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)"
  if [ "$local_main_ahead_count" -ne 0 ]; then
    echo "Local main is ahead of origin/main; aborting."
    echo "Reconcile local commits before running Release Finalize."
    exit 2
  fi
  exit "$pull_status"
fi

git merge --ff-only "origin/$release_branch"
git push origin main

echo "Merged $release_branch into main and pushed origin/main."
echo "Optional PR follow-up:"
echo "  gh pr list --state open --head \"$release_branch\" --json number,url"
echo "  gh pr comment <number> --body \"Published to npm and merged into main.\""
echo "  gh pr close <number> --delete-branch=false"
'''


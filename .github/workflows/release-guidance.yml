name: Release Guidance Package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish @brainwav/design-system-guidance after validation"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string

concurrency:
  group: release-guidance
  cancel-in-progress: false

jobs:
  validate-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Install deps
        run: pnpm -C packages/design-system-guidance install --ignore-workspace --prod=false --lockfile=false

      - name: Validate package gates
        run: |
          pnpm -C packages/design-system-guidance type-check
          pnpm -C packages/design-system-guidance build
          pnpm -C packages/design-system-guidance check:ci

      - name: Verify package contents
        run: |
          cd packages/design-system-guidance
          npm pack --dry-run

  publish-guidance:
    needs: validate-guidance
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.28.0

      - name: Install deps
        run: pnpm -C packages/design-system-guidance install --ignore-workspace --prod=false --lockfile=false

      - name: Build package
        run: pnpm -C packages/design-system-guidance build

      - name: Publish @brainwav/design-system-guidance (restricted)
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          cd packages/design-system-guidance
          npm publish --access restricted --tag "$NPM_TAG"

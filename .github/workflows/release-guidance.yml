name: Release Guidance Package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish @brainwav/design-system-guidance after validation"
        required: true
        type: boolean
        default: false
      npm_tag:
        description: "npm dist-tag"
        required: false
        default: "latest"
        type: string

concurrency:
  group: release-guidance
  cancel-in-progress: false

jobs:
  validate-guidance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Verify npm auth (BRAINWAV_NPM_TOKEN)
        env:
          NPM_TOKEN: ${{ secrets.BRAINWAV_NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.BRAINWAV_NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "BRAINWAV_NPM_TOKEN is not set." >&2
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org

      - name: Install deps
        run: pnpm -C packages/design-system-guidance install --ignore-workspace --prod=false --lockfile=false

      - name: Validate package gates
        run: |
          pnpm -C packages/design-system-guidance type-check
          pnpm -C packages/design-system-guidance build
          pnpm -C packages/design-system-guidance check:ci

      - name: Verify package contents
        run: |
          cd packages/design-system-guidance
          npm pack --dry-run

  publish-guidance:
    needs: validate-guidance
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Install deps
        run: pnpm -C packages/design-system-guidance install --ignore-workspace --prod=false --lockfile=false

      - name: Build package
        run: pnpm -C packages/design-system-guidance build

      - name: Publish @brainwav/design-system-guidance (restricted)
        run: |
          cd packages/design-system-guidance
          npm publish --access restricted --tag "${{ inputs.npm_tag }}"
        env:
          NPM_TOKEN: ${{ secrets.BRAINWAV_NPM_TOKEN }}

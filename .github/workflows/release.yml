name: Public Release Guardrail (No Publish)

on:
  workflow_dispatch:

concurrency:
  group: release-main-guardrail
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Install deps
        run: pnpm install --frozen-lockfile --prod=false

      - name: Validate public release gates
        run: |
          pnpm -C packages/ui type-check
          pnpm -C packages/runtime type-check
          pnpm -C packages/tokens type-check
          pnpm -C packages/tokens validate
          pnpm ds:matrix:check
          pnpm test:policy
          pnpm build:lib
